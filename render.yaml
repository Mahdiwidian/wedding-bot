# Render Blueprint - Wedding Bot
# https://render.com/docs/blueprint-spec

services:
  # WhatsApp Bot Service
  - type: web
    name: wedding-bot
    env: node
    region: singapore
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: auth
      mountPath: /app/auth
      sizeGB: 1
 envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
 - key: SESSION_ID
        value: wedding-bot-session
      - fromGroup: wedding-bot-secrets

  # PostgreSQL Database
  - type: psql
    name: wedding-bot-db
    plan: free
    region: singapore
    databaseName: wedding_bot
    ipAllowList: []
